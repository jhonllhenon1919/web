<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>
    <style>
        body {
            background-image: url(background.png);
            
        }

        h1 {
            background-image: url(m.jpg);
           font-size: medium;
        }

        .container {
            width: 350px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: pink;
            color: black;
        }

        .delete {
            background: red;
        }
        .updateItem{
            background: green;
        }
        .viewDeleted{
            background: violet;
        }
    </style>
</head>

<body>

<h1> <img src = "m.jpg" alt= "Inventory System"></h1>

<div class="container">
    <input type="text" id="name" placeholder="Item Name">
    <input type="number" id="qty" placeholder="Quantity">

    <button onclick="addItem()">Add Item</button>
    <button onclick ="viewDeleted()">View Deleted</button>
    
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Quantity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<table>
</div>

<script>
    let inventory = [];
    let deletedItems = [];

    function addItem() {
        let name = document.getElementById("name").value;
        let qty = document.getElementById("qty").value;

        if (name === "" || qty === "") {
            alert("Please fill all fields!");
            return;
        }

        inventory.push({name, qty});
        displayItems();

        document.getElementById("name").value = "";
        document.getElementById("qty").value = "";
    }
    function updateItem(index) {
    // kuha ang item nga i-update
    let item = inventory[index];

    // prompt user para sa bag-ong name ug quantity
    let newName = prompt("Update Item Name:", item.name);
    if (newName === null || newName === "") return; // cancel or empty

    let newQty = prompt("Update Quantity:", item.qty);
    if (newQty === null || newQty === "" || isNaN(newQty)) return; // cancel or invalid

    // update sa array
    item.name = newName;
    item.qty = newQty;

    // refresh table
    displayItems();
}
    function displayItems() {
        let table = document.getElementById("tableBody");
        table.innerHTML = "";
         inventory.sort((a, b) => b.qty - a.qty);

        inventory.forEach((item, index) => {
            table.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>
                         <button class="updateItem" onclick="updateItem(${index})">Update Item</button>
                        <button class="delete" onclick="deleteItem(${index})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }
function deleteItem(index) {
    let removed = inventory.splice(index, 1)[0];

    // kuha existing deleted sa localStorage
    let deleted = JSON.parse(localStorage.getItem("deletedItems")) || [];

    // add ang bag-o
    deleted.push(removed);

    // save balik
    localStorage.setItem("deletedItems", JSON.stringify(deleted));

    // redirect padulong deleted page
    window.location.href = "deleted.html";
}
function viewDeleted (){
    window.location.href = "deleted.html";
}
</script>

</body>
</html>
